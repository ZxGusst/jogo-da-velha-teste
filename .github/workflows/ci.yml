name: CI Pipeline - Jogo da Velha

on:
  push:
    branches: ["**"]
  pull_request:

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compilar projeto
        run: mvn clean compile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Executar testes
        run: mvn test

      - name: Salvar relatório JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Gerar JAR
        run: mvn package -DskipTests

      - name: Deploy simulado
        run: |
          echo "Projeto : $(mvn help:evaluate -Dexpression=project.name -q -DforceStdout)"
          echo "Versao  : $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          echo "Commit  : ${{ github.sha }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Deploy simulado com sucesso!"

      - name: Salvar JAR
        uses: actions/upload-artifact@v4
        with:
          name: jogo-da-velha-jar
          path: target/*.jar
          retention-days: 7
