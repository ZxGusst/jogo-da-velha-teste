name: CI Pipeline - Jogo da Velha

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ── STAGE: BUILD ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Compilar projeto
        run: mvn clean compile

      - name: Salvar artefatos de build
        uses: actions/upload-artifact@v4
        with:
          name: build-classes
          path: target/classes/
          retention-days: 1

  # ── STAGE: TEST ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Executar testes
        run: mvn test

      - name: Publicar relatório de testes (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

      - name: Salvar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ── STAGE: DEPLOY (somente na branch main) ───────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Gerar JAR
        run: mvn package -DskipTests

      - name: Deploy simulado
        run: |
          echo "=========================================="
          echo "  DEPLOY NA BRANCH MAIN"
          echo "=========================================="
          echo "Projeto  : $(mvn help:evaluate -Dexpression=project.name -q -DforceStdout)"
          echo "Versao   : $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          echo "Commit   : ${{ github.sha }}"
          echo "Branch   : ${{ github.ref_name }}"
          echo "Run      : ${{ github.run_number }}"
          echo "------------------------------------------"
          ls -lh target/*.jar
          echo "------------------------------------------"
          echo "Deploy simulado concluido com sucesso!"
          echo "=========================================="

      - name: Salvar JAR
        uses: actions/upload-artifact@v4
        with:
          name: jogo-da-velha-jar
          path: target/*.jar
          retention-days: 7
